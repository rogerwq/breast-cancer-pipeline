name        = "LLM Patient Report"
description = """
Generates a 7-section patient-friendly medical report using a local LLM
(Ollama phi3:mini — runs on CPU, no NVIDIA required).
Sections: What We Found, Is This Dangerous, See a Doctor, Treatment,
Chemotherapy, Warning Signs, Disclaimer.
Also computes ROUGE and BERTScore vs. verified medical ground truth.
"""

inputs  = ["cnn_prediction.json"]
outputs = ["patient_report.txt", "evaluation_scores.json"]

[container]
image = "breast-cancer-pipeline:latest"

[scripts]
run = "run.sh"

[params.ollama_model]
type    = "string"
default = "mistral"
hint    = "Ollama model name. Must be baked into the image or pulled before running."

[params.max_tokens]
type    = "integer"
default = 700
hint    = "Maximum tokens to generate for the report"
